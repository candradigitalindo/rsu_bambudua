; PHP-FPM Pool Configuration for RSU Bambudua
; Optimized for Laravel 11 Application
; File location: /etc/php/8.3/fpm/pool.d/bambudua.conf

[bambudua]

; Pool user and group
user = www-data
group = www-data

; Socket configuration
listen = /var/run/php/php8.3-fpm-bambudua.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process Manager: dynamic
pm = dynamic

; Maximum child processes (adjust based on RAM)
; Formula: (Total RAM - Reserved) / Average PHP process size
; For 4GB server: (4096MB - 1024MB) / 64MB = ~48
pm.max_children = 40

; Initial processes
pm.start_servers = 8

; Minimum idle processes
pm.min_spare_servers = 4

; Maximum idle processes  
pm.max_spare_servers = 12

; Process recycling (prevent memory leaks)
pm.max_requests = 500

; Process idle timeout
pm.process_idle_timeout = 10s

; Status and ping endpoints
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Logging
php_admin_value[error_log] = /var/log/php-fpm/bambudua-error.log
php_admin_flag[log_errors] = on
slowlog = /var/log/php-fpm/bambudua-slow.log
request_slowlog_timeout = 10s

; Performance Settings
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 180
php_admin_value[max_input_time] = 180

; Upload settings
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size] = 50M

; OPcache optimization
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 256
php_admin_value[opcache.interned_strings_buffer] = 16
php_admin_value[opcache.max_accelerated_files] = 20000
php_admin_value[opcache.validate_timestamps] = 0
php_admin_value[opcache.revalidate_freq] = 0
php_admin_value[opcache.fast_shutdown] = 1
php_admin_value[opcache.enable_file_override] = 1

; Realpath cache
php_admin_value[realpath_cache_size] = 4096K
php_admin_value[realpath_cache_ttl] = 600

; Security
php_admin_value[expose_php] = Off
php_admin_value[display_errors] = Off
php_admin_value[display_startup_errors] = Off

; Timezone
php_admin_value[date.timezone] = Asia/Jakarta

; Session
php_value[session.save_handler] = files
php_value[session.save_path] = /var/www/rsu_bambudua/storage/framework/sessions

; Request settings
request_terminate_timeout = 180s
catch_workers_output = yes
clear_env = no

; Environment variables
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
